<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Abstract data visualization - bar chart element -->
  <g transform="translate(30, 140)">
    <rect x="0" y="-20" width="20" height="60" rx="4" fill="url(#primaryGrad)" opacity="0.9"/>
    <rect x="30" y="-50" width="20" height="90" rx="4" fill="url(#primaryGrad)" opacity="0.8"/>
    <rect x="60" y="-35" width="20" height="75" rx="4" fill="url(#primaryGrad)" opacity="0.85"/>
    <rect x="90" y="-65" width="20" height="105" rx="4" fill="url(#accentGrad)"/>
  </g>
  
  <!-- Line chart overlay -->
  <polyline 
    points="35,125 65,95 95,110 125,80 155,60" 
    fill="none" 
    stroke="#F59E0B" 
    stroke-width="3" 
    stroke-linecap="round" 
    stroke-linejoin="round"/>
  
  <!-- Data points -->
  <circle cx="35" cy="125" r="5" fill="#F59E0B"/>
  <circle cx="65" cy="95" r="5" fill="#F59E0B"/>
  <circle cx="95" cy="110" r="5" fill="#F59E0B"/>
  <circle cx="125" cy="80" r="5" fill="#F59E0B"/>
  <circle cx="155" cy="60" r="5" fill="#F59E0B"/>
  
  <!-- Circular accent element -->
  <circle cx="155" cy="55" r="12" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- O letterform suggestion in center negative space -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#4F46E5" stroke-width="2" opacity="0.1"/>
</svg>
