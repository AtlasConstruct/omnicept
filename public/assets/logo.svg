<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf5050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a84444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#262525" rx="0"/>

  <!-- Diagonal hatching -->
  <pattern id="hatch" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(-45)">
    <line x1="0" y1="0" x2="0" y2="16" stroke="rgba(191,80,80,0.06)" stroke-width="8"/>
  </pattern>
  <rect width="200" height="200" fill="url(#hatch)"/>

  <!-- Angular clip bar chart -->
  <g transform="translate(28, 155)">
    <polygon points="0,-30 24,-30 24,0 0,0" fill="url(#redGrad)" opacity="0.5" transform="skewX(-4)"/>
    <polygon points="36,-60 60,-60 60,0 36,0" fill="url(#redGrad)" opacity="0.65" transform="skewX(-4)"/>
    <polygon points="72,-45 96,-45 96,0 72,0" fill="url(#redGrad)" opacity="0.55" transform="skewX(-4)"/>
    <polygon points="108,-80 132,-80 132,0 108,0" fill="url(#redGrad)" opacity="0.85" transform="skewX(-4)"/>
  </g>

  <!-- Trend line -->
  <polyline
    points="40,130 76,100 112,115 148,80"
    fill="none"
    stroke="#bf5050"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="40" cy="130" r="4" fill="#bf5050"/>
  <circle cx="76" cy="100" r="4" fill="#bf5050"/>
  <circle cx="112" cy="115" r="4" fill="#bf5050"/>
  <circle cx="148" cy="80" r="4" fill="#bf5050"/>

  <!-- Accent ring -->
  <circle cx="148" cy="80" r="10" fill="none" stroke="rgba(191,80,80,0.3)" stroke-width="1.5"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="192" width="80" height="3" fill="#bf5050" transform="skewX(-4)"/>

  <!-- Corner cut -->
  <polygon points="200,180 200,200 180,200" fill="#1a1919"/>
</svg>
